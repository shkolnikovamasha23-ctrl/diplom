{% extends "base.html" %}{% block content %}<h1>Управление сценариями</h1><form method="post" class="form card"><label>Название<input name="title" required></label><label>Slug<input name="slug" required></label><label>Сложность<input name="difficulty" value="Начальный"></label><label>Минуты<input name="duration_minutes" type="number" value="20"></label><label>Краткое описание<textarea name="summary"></textarea></label><label>Цель<textarea name="learning_goal"></textarea></label><button class="btn">Добавить</button></form><table><tr><th>ID</th><th>Название</th><th>Сложность</th></tr>{% for s in scenarios %}<tr><td>{{ s.id }}</td><td>{{ s.title }}</td><td>{{ s.difficulty }}</td></tr>{% endfor %}</table>{% endblock %}
