{% extends "base.html" %}{% block content %}<article class="card"><h1>{{ scenario.title }}</h1><p>{{ scenario.summary }}</p><p><b>Цель обучения:</b> {{ scenario.learning_goal }}</p><h2>Структура сценария</h2>{% for m in modules %}<div class="step"><b>{{ m.title }}</b><p>{{ m.content }}</p></div>{% endfor %}<a class="btn" href="{{ url_for('cabinet.run_scenario', scenario_id=scenario.id) }}">Пройти сценарий</a></article>{% endblock %}
