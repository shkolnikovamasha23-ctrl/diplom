{% extends "base.html" %}{% block content %}<h1>Каталог учебных сценариев</h1><p>Каждый сценарий содержит теоретический блок, практическую ситуацию, вопросы и автоматическую оценку результата.</p><div class="grid">{% for s in scenarios %}<article class="card"><h2>{{ s.title }}</h2><p>{{ s.learning_goal }}</p><a class="btn secondary" href="{{ url_for('public.scenario_detail', slug=s.slug) }}">Открыть</a></article>{% endfor %}</div>{% endblock %}
