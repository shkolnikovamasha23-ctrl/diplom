{% extends "base.html" %}{% block content %}<h1>Сформированные документы</h1><p>Здесь отображаются DOCX и XLSX, созданные приложением.</p><table><tr><th>Тип</th><th>Название</th><th>Дата</th></tr>{% for d in documents %}<tr><td>{{ d.doc_type }}</td><td>{{ d.title }}</td><td>{{ d.created_at }}</td></tr>{% endfor %}</table><a class="btn" href="{{ url_for('cabinet.export_xlsx') }}">Сформировать XLSX</a>{% endblock %}
