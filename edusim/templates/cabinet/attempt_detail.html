{% extends "base.html" %}{% block content %}<article class="card"><h1>Результат: {{ attempt.scenario_title }}</h1><p>Итоговый балл: <b>{{ attempt.score }}</b></p>{% for a in answers %}<div class="answer {{ 'ok' if a.is_correct else 'bad' }}"><b>{{ a.text }}</b><p>Ответ: {{ a.option_text }}</p><p>{{ a.explanation }}</p></div>{% endfor %}<a class="btn" href="{{ url_for('cabinet.export_docx', attempt_id=attempt.id) }}">Сформировать DOCX</a></article>{% endblock %}
