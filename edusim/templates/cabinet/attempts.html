{% extends "base.html" %}{% block content %}<h1>Мои попытки</h1><table><tr><th>ID</th><th>Сценарий</th><th>Балл</th><th>Статус</th><th></th></tr>{% for a in attempts %}<tr><td>{{ a.id }}</td><td>{{ a.scenario_title }}</td><td>{{ a.score }}</td><td>{{ a.status }}</td><td><a href="{{ url_for('cabinet.attempt_detail', attempt_id=a.id) }}">Открыть</a></td></tr>{% endfor %}</table><a class="btn" href="{{ url_for('cabinet.export_xlsx') }}">Скачать XLSX</a>{% endblock %}
