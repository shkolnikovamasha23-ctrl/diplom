{% extends "base.html" %}{% block content %}<form method="post" class="card"><h1>{{ scenario.title }}</h1><p>{{ scenario.learning_goal }}</p>{% for q in questions %}<fieldset class="question"><legend>{{ loop.index }}. {{ q.text }}</legend>{% for o in options[q.id] %}<label class="radio"><input type="radio" name="q_{{ q.id }}" value="{{ o.id }}" required> {{ o.text }}</label>{% endfor %}</fieldset>{% endfor %}<button class="btn">Завершить сценарий</button></form>{% endblock %}
