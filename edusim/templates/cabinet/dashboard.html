{% extends "base.html" %}{% block content %}<h1>Личный кабинет</h1><div class="grid"><section class="card"><h2>Пользователь</h2><p>{{ user.full_name }}</p><p>Роль: {{ user.role_name }}</p></section><section class="card"><h2>Последние попытки</h2>{% for a in attempts %}<p><a href="{{ url_for('cabinet.attempt_detail', attempt_id=a.id) }}">{{ a.scenario_title }}</a> — {{ a.score }} баллов</p>{% else %}<p>Пока нет попыток.</p>{% endfor %}</section></div>{% endblock %}
