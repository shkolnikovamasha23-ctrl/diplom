{% extends "base.html" %}{% block content %}<section class="card"><h1>Файловое хранилище</h1><form method="post" enctype="multipart/form-data" class="form"><label>Файл<input type="file" name="file" required></label><button class="btn">Загрузить</button></form><table><tr><th>Имя</th><th>Размер</th><th>Дата</th></tr>{% for f in files %}<tr><td>{{ f.original_name }}</td><td>{{ f.file_size }}</td><td>{{ f.uploaded_at }}</td></tr>{% endfor %}</table></section>{% endblock %}
