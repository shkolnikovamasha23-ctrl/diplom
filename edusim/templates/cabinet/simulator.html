{% extends "base.html" %}{% block content %}<h1>Выбор симулятора</h1><div class="grid">{% for s in scenarios %}<article class="card"><h2>{{ s.title }}</h2><p>{{ s.summary }}</p><button class="btn open-dialog" data-target="dialog-{{ s.id }}">Начать</button><div class="dialog" id="dialog-{{ s.id }}"><div><h3>Подтверждение запуска</h3><p>Вы запускаете сценарий «{{ s.title }}».</p><a class="btn" href="{{ url_for('cabinet.run_scenario', scenario_id=s.id) }}">Продолжить</a><button class="btn secondary close-dialog">Закрыть</button></div></div></article>{% endfor %}</div>{% endblock %}
